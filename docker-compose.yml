version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: todo_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  # Todo API Service
  todo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      SERVER_PORT: 8080
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: todo_db
      DB_USER: postgres
      DB_PASSWORD: securepassword
      DB_SSLMODE: disable
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - todo-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  todo-network:
    driver: bridge
